<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phoropter.ai</title>
  <meta name="description" content="1 or 2?">

  <!-- Social previews -->
  <meta property="og:title" content="⏿ phoropter.ai">
  <meta property="og:description" content="1 or 2?">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://phoropter.ai">
  <meta property="og:image" content="https://phoropter.ai/og.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://phoropter.ai/og.svg">
  <meta name="twitter:title" content="⏿ phoropter.ai">
  <meta name="twitter:description" content="1 or 2?">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏿</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.usefathom.com/script.js" data-site="NZCRGEGO" defer></script>
</head>
<body data-phase="entry">

  <header id="mark">⏿</header>

  <!-- ENTRY PHASE: pre-rendered binary pairs -->
  <main id="entry">
    <div id="entry-frame" aria-live="polite">
      <p id="entry-option-1" class="choice" role="button" tabindex="0"></p>
      <p id="entry-option-2" class="choice" role="button" tabindex="0"></p>
    </div>
    <button id="entry-cycle" class="cycle">→ different question</button>
  </main>

  <!-- SESSION PHASE: generative conversation -->
  <main id="session">
    <div id="session-history"></div>
    <div id="session-frame" aria-live="polite">
      <p id="session-option-1" class="choice" role="button" tabindex="0"></p>
      <p id="session-option-2" class="choice" role="button" tabindex="0"></p>
    </div>
    <div id="session-actions">
      <button id="session-cycle" class="cycle">→ different question</button>
      <button id="start-over" class="cycle">start over</button>
    </div>
    <div id="session-loading">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
    <div id="session-error" hidden>
      <p>something got in the way. <button id="retry">try again</button></p>
    </div>
  </main>

  <footer id="footer">
    <a href="https://github.com/lightward/phoropter">github</a>
    <a href="https://lightward.com">lightward.com</a>
    <a href="https://lightward.inc">lightward.inc</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
